version: "1.0"

intents:
  - name: start_machine
    description: "장비를 시작한다."
    target_scope: equipment
    required_capability: machine.start
    is_risky: true
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
    seed_utterances:
      - "장비 시작해"
      - "설비 가동해"
      - "장비 스타트"
      - "장비 start"
      - "가동 시작해"
      - "시작해"
      - "machine start 해줘"

  - name: stop_machine
    description: "장비를 정지한다."
    target_scope: equipment
    required_capability: machine.stop
    is_risky: true
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
    seed_utterances:
      - "장비 멈춰"
      - "설비 정지"
      - "장비 스탑"
      - "장비 stop"
      - "멈춰줘"
      - "정지해"
      - "machine stop 해줘"

  - name: emergency_stop
    description: "장비를 비상 정지한다."
    target_scope: equipment
    required_capability: machine.emergency_stop
    is_risky: true
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
    seed_utterances:
      - "장비 비상 정지"
      - "비상정지해"
      - "설비 긴급 정지"
      - "emergency stop"
      - "비상정지"
      - "긴급 정지해"
      - "emergency 정지"

  - name: check_status
    description: "장비 상태를 조회한다."
    target_scope: equipment
    required_capability: machine.status.read
    is_risky: false
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
    seed_utterances:
      - "장비 상태 알려줘"
      - "설비 상태 확인해"
      - "장비 상태 보여줘"
      - "상태 조회해"
      - "상태 확인"
      - "현재 상태 알려줘"
      - "machine status 확인해"

  - name: change_model
    description: "비전 검사 모델을 변경한다."
    target_scope: equipment
    required_capability: vision.model.change
    is_risky: true
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
      - name: model_name
        type: string
        required: true
    seed_utterances:
      - "장비 모델 A로 바꿔"
      - "설비 모델 B로 변경해"
      - "모델 변경해"
      - "모델 A로 전환해"
      - "검사 모델 A로 변경"
      - "비전 모델 B로 바꿔"
      - "모델 C 적용해"

  - name: set_light_intensity
    description: "조명 밝기를 설정한다."
    target_scope: component
    target_component_type: led_light
    required_capability: light.intensity.set
    is_risky: false
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
      - name: component_id
        type: string
        required: false
        default: "led_light"
      - name: value
        type: integer
        required: true
        min: 0
        max: 255
    seed_utterances:
      - "조명 밝기 250으로 올려"
      - "조명 150으로 맞춰"
      - "led 조명 밝기 조정해"
      - "조명 밝기 100으로 설정해"
      - "라이트 세기 200으로 바꿔"
      - "LED intensity 180으로 맞춰"

  - name: set_camera_exposure
    description: "카메라 exposure 값을 설정한다."
    target_scope: component
    target_component_type: camera
    required_capability: camera.exposure.set
    is_risky: false
    allowed_decisions: ["confirm", "reject", "execute"]
    slots:
      - name: machine_id
        type: string
        required: true
      - name: component_id
        type: string
        required: false
        default: "camera"
      - name: value
        type: integer
        required: true
        min: 100
        max: 100000
    seed_utterances:
      - "카메라 노출값 800으로 바꿔"
      - "camera exposure 1200으로 설정해"
      - "노출 1000으로 맞춰"
      - "카메라 exposure 값을 500으로 바꿔"
      - "비전 카메라 노출 2000으로 설정해"
      - "camera 노출 1500으로 맞춰"

  - name: set_camera_gain
    description: "카메라 gain 값을 설정한다."
    target_scope: component
    target_component_type: camera
    required_capability: camera.gain.set
    is_risky: false
