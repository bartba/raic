    slots:
      - name: machine_id
        type: string
        required: true
      - name: component_id
        type: string
        required: false
        default: "camera"
      - name: value
        type: number
        required: true
        min: 0
        max: 100
    seed_utterances:
      - "카메라 게인 10으로 설정해"
      - "camera gain 5로 바꿔"
      - "게인값 조정해"
      - "카메라 gain 12로 설정해"
      - "비전 카메라 게인 8로 변경해"
      - "gain 값 20으로 맞춰"

  - name: set_robot_speed
    description: "로봇 속도를 설정한다."
    target_scope: component
    target_component_type: robot
    required_capability: robot.speed.set
    is_risky: true
