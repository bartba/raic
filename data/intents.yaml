        type: string
        required: true
      - name: component_id
        type: string
        required: false
        default: "robot"
      - name: value
        type: integer
        required: true
        min: 1
        max: 100
      - name: unit
        type: enum
        required: false
        values: ["percent"]
        default: "percent"
    seed_utterances:
      - "로봇 속도 60으로 올려"
      - "robot 속도 30퍼센트로 설정해"
      - "로보트 속도 조정해"
      - "로봇 속도 40 percent로 맞춰"
