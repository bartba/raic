version: "1.0"

cases:
  - utterance: "검사기 시작해"
    expected_intent: "start_machine"
  - utterance: "비전 검사기 가동해"
    expected_intent: "start_machine"
  - utterance: "검사기 멈춰"
    expected_intent: "stop_machine"
  - utterance: "비전 검사기 정지해"
    expected_intent: "stop_machine"
  - utterance: "검사기 비상정지해"
    expected_intent: "emergency_stop"
  - utterance: "비전 검사기 긴급 정지"
    expected_intent: "emergency_stop"
  - utterance: "검사기 상태 알려줘"
    expected_intent: "check_status"
  - utterance: "비전 검사기 상태 확인해"
    expected_intent: "check_status"
  - utterance: "검사기 모델 A로 바꿔"
    expected_intent: "change_model"
  - utterance: "비전 검사기 모델 B로 변경해"
    expected_intent: "change_model"

  - utterance: "검사기 조명 밝기 250으로 올려"
    expected_intent: "set_light_intensity"
  - utterance: "검사기 조명 150으로 맞춰"
    expected_intent: "set_light_intensity"
  - utterance: "검사기 카메라 exposure 1200으로 설정해"
    expected_intent: "set_camera_exposure"
  - utterance: "비전 검사기 카메라 노출값 800으로 바꿔"
    expected_intent: "set_camera_exposure"
  - utterance: "검사기 카메라 gain 5로 바꿔"
    expected_intent: "set_camera_gain"
  - utterance: "비전 검사기 카메라 게인 10으로 설정해"
    expected_intent: "set_camera_gain"
  - utterance: "검사기 로봇 속도 60으로 올려"
    expected_intent: "set_robot_speed"
  - utterance: "비전 검사기 로봇 속도 30퍼센트로 설정해"
    expected_intent: "set_robot_speed"

  - utterance: "검사기 PLC 상태 알려줘"
    expected_intent: "check_plc_status"
  - utterance: "검사기 피엘씨 상태 확인해"
    expected_intent: "check_plc_status"
  - utterance: "검사기 PLC 리셋해"
    expected_intent: "plc_reset"
  - utterance: "비전 검사기 피엘씨 초기화해"
    expected_intent: "plc_reset"
  - utterance: "검사기 PLC 제품 투입해"
    expected_intent: "plc_bring_in"
  - utterance: "비전 검사기 피엘씨 제품 투입 동작 실행해"
    expected_intent: "plc_bring_in"
  - utterance: "검사기 PLC 제품 정렬해"
    expected_intent: "plc_align"
  - utterance: "비전 검사기 피엘씨 제품 얼라인"
    expected_intent: "plc_align"
  - utterance: "검사기 PLC 제품 올려"
    expected_intent: "plc_move_up"
  - utterance: "비전 검사기 피엘씨 제품 업"
    expected_intent: "plc_move_up"
  - utterance: "검사기 PLC 제품 회전해"
    expected_intent: "plc_rotate"
  - utterance: "비전 검사기 피엘씨 제품 돌려"
    expected_intent: "plc_rotate"
  - utterance: "검사기 PLC 제품 내려"
    expected_intent: "plc_move_down"
  - utterance: "비전 검사기 피엘씨 제품 하강"
    expected_intent: "plc_move_down"
  - utterance: "검사기 PLC 제품 뒤집어"
    expected_intent: "plc_flip"
  - utterance: "비전 검사기 피엘씨 제품 뒤집어"
    expected_intent: "plc_flip"
  - utterance: "검사기 PLC 배출해"
    expected_intent: "plc_send_out"
  - utterance: "비전 검사기 피엘씨 제품 배출해"
    expected_intent: "plc_send_out"

  - utterance: "오늘 점심 뭐야"
    expected_intent: "unknown"
  - utterance: "창문 좀 열어"
    expected_intent: "unknown"
